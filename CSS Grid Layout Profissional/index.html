<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<title>Vendas Trimestrais Grid</title>

</head>

<body>

<div class="tabela-grid">

    <!-- TÍTULO -->
    <div class="item titulo">
        CSS Grid Layout Profissional
    </div>

    <!-- CABEÇALHO -->
    <div class="item header">
        Produto
    </div>

    <div class="item header" style="grid-column: span 3;">
        Vendas do 1º Trimestre
    </div>

    <!-- SUBHEADER -->
    <div class="item subheader"></div>

    <div class="item subheader">
        Janeiro
    </div>

    <div class="item subheader">
        Fevereiro
    </div>

    <div class="item subheader">
        Março
    </div>

    <!-- LINHA 1 -->
    <div class="item produto dado">
        Notebook Gamer
    </div>

    <div class="item dado">
        R$ 15.000
    </div>

    <div class="item dado">
        R$ 12.500
    </div>

    <div class="item dado">
        R$ 18.200
    </div>

    <!-- LINHA 2 -->
    <div class="item produto dado">
        Mouse Sem Fio
    </div>

    <div class="item dado">
        R$ 1.200
    </div>

    <div class="item dado">
        R$ 950
    </div>

    <div class="item dado">
        R$ 1.100
    </div>

    <!-- LINHA 3 -->
    <div class="item produto dado">
        Monitor 4K
    </div>

    <div class="item dado">
        R$ 5.400
    </div>

    <div class="item dado">
        R$ 4.800
    </div>

    <div class="item dado">
        R$ 6.100
    </div>

    <!-- TOTAL -->
    <div class="item total-texto">
        Total Geral:
    </div>

    <div class="item total-valor">
        R$ 65.250
    </div>

</div>

</body>
</html>
